<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760">
  <defs>
    <style>
      .title { font: 800 34px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #223038; }
      .note { font: 500 17px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #60727a; }
      .label { font: 800 26px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #2f3f46; }
      .caption { font: 500 15px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #75868e; }
      .panel { fill: #fbfcfc; stroke: #dbe4e7; stroke-width: 2; }
      .tile { fill: #f5f7f7; stroke: #e0e8ea; stroke-width: 2; }
      .watermark { fill: #f2f0f4; stroke: #e0e7e9; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1440" height="760" fill="#eef3f2"/>
  <text x="64" y="72" class="title">Source mark candidates</text>
  <text x="64" y="108" class="note">当前图标已接入应用。三个来源均使用纯色 SVG：Wenku8 使用用户确认稿，Yamibo/ESJ 使用裁切后的矢量稿。</text>

  <g transform="translate(64 152)">
    <rect class="panel" width="400" height="520" rx="28"/>
    <text x="32" y="54" class="label">Wenku8</text>
    <text x="32" y="84" class="caption">用户确认稿：樱花叠放在打开书本上</text>
    <rect class="tile" x="72" y="120" width="256" height="256" rx="44"/>
    <image href="wenku8_mono_composite.svg" x="72" y="120" width="256" height="256" preserveAspectRatio="xMidYMid meet"/>
    <rect class="watermark" x="32" y="408" width="336" height="72" rx="18"/>
    <image href="wenku8_mono_composite.svg" x="230" y="374" width="128" height="128" opacity="0.16" preserveAspectRatio="xMidYMid meet"/>
    <text x="52" y="452" class="caption">水印预览：右下角低透明度</text>
  </g>

  <g transform="translate(520 152)">
    <rect class="panel" width="400" height="520" rx="28"/>
    <text x="32" y="54" class="label">Yamibo</text>
    <text x="32" y="84" class="caption">来自双色 SVG 的黄色中心花叶，已去掉字样</text>
    <rect class="tile" x="72" y="120" width="256" height="256" rx="44"/>
    <image href="yamibo_lily_center.svg" x="72" y="120" width="256" height="256" preserveAspectRatio="xMidYMid meet"/>
    <rect class="watermark" x="32" y="408" width="336" height="72" rx="18"/>
    <image href="yamibo_lily_center.svg" x="232" y="372" width="128" height="128" opacity="0.16" preserveAspectRatio="xMidYMid meet"/>
    <text x="52" y="452" class="caption">水印预览：纯色 SVG 可按主题着色</text>
  </g>

  <g transform="translate(976 152)">
    <rect class="panel" width="400" height="520" rx="28"/>
    <text x="32" y="54" class="label">ESJ</text>
    <text x="32" y="84" class="caption">已切掉右侧 ESJ 字母，只保留左侧主标矢量化</text>
    <rect class="tile" x="72" y="120" width="256" height="256" rx="44"/>
    <image href="esj_traced_mono.svg" x="72" y="120" width="256" height="256" preserveAspectRatio="xMidYMid meet"/>
    <rect class="watermark" x="32" y="408" width="336" height="72" rx="18"/>
    <image href="esj_traced_mono.svg" x="228" y="372" width="128" height="128" opacity="0.16" preserveAspectRatio="xMidYMid meet"/>
    <text x="52" y="452" class="caption">水印预览：主标去字母，缩小更清楚</text>
  </g>
</svg>
